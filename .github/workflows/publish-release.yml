name: Create and Publish Release 

on:
  push:
    branches:
      - master
      - 'release/*'
      - develop

permissions:
  contents: write
  # This permission is required for this workflow; 
  # otherwise, the called workflow will not have it.
  id-token: write

jobs:
  publish_release:
    name: Create and Publish Release
    runs-on: ubuntu-24.04
    outputs:
      released: ${{ steps.semantic_version_release.outputs.released }}

    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}
      cancel-in-progress: false

    steps:
      - name: Checkout Repository on Release Branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.TEMP_SEMANTIC_RELEASE_GH_TOKEN }}

      - name: Force release branch to be at workflow sha
        run: |
          git reset --hard ${{ github.sha }}

      - name: Verify upstream has NOT changed
        shell: bash
        run: |
          set +o pipefail

          UPSTREAM_BRANCH_NAME="$(git status -sb | head -n 1 | awk -F '\\.\\.\\.' '{print $2}' | cut -d ' ' -f1)"
          printf '%s\n' "Upstream branch name: $UPSTREAM_BRANCH_NAME"

          set -o pipefail

          if [ -z "$UPSTREAM_BRANCH_NAME" ]; then
              printf >&2 '%s\n' "::error::Unable to determine upstream branch name!"
              exit 1
          fi

          git fetch "${UPSTREAM_BRANCH_NAME%%/*}"

          if ! UPSTREAM_SHA="$(git rev-parse "$UPSTREAM_BRANCH_NAME")"; then
              printf >&2 '%s\n' "::error::Unable to determine upstream branch sha!"
              exit 1
          fi

          HEAD_SHA="$(git rev-parse HEAD)"

          if [ "$HEAD_SHA" != "$UPSTREAM_SHA" ]; then
              printf >&2 '%s\n' "[HEAD SHA] $HEAD_SHA != $UPSTREAM_SHA [UPSTREAM SHA]"
              printf >&2 '%s\n' "::error::Upstream has changed, aborting release..."
              exit 1
          fi

          printf '%s\n' "Verified upstream branch has not changed, continuing with release..."

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: '2.4.1'
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install semantic-release and plugins
        run: |
          npm install \
            semantic-release@25.0.3 \
            @semantic-release/exec@7.1.0 \
            @semantic-release/commit-analyzer@13.0.1 \
            @semantic-release/release-notes-generator@14.1.1 \
            @semantic-release/changelog@6.0.3 \
            @semantic-release/git@10.0.1 \
            @semantic-release/github@12.0.8 \
            conventional-changelog-conventionalcommits@9.3.1

      - name: Semantic Version Release
        id: semantic_version_release
        env:
          # this token should have at lease these permissions:
          #   contents: write # to be able to publish a GitHub release
          #   issues: write # to be able to comment on released issues
          #   pull-requests: write # to be able to comment on released pull requests
          GH_TOKEN: ${{ secrets.TEMP_SEMANTIC_RELEASE_GH_TOKEN   }}
          DEV_NUM: ${{ steps.compute_dev_version.outputs.dev_num }}
        run: |
          # Setting the default value: if a new release is published, 
          # `semantic-release` will set the `released` variable to `true`
          echo "released=false" >> "$GITHUB_OUTPUT"
          npx semantic-release
  
  call_publish_package:
    name: Call publish package workflow
    needs: publish_release
    # Trigger the publish package workflow only 
    # if a new release has actually been released
    if: needs.publish_release.outputs.released == 'true'
    uses: ./.github/workflows/publish-package.yml
    with:
      # Since the workflow is triggered by a release, it doesn`t 
      # have access to the name of the branch from which it was launched
      branch_name: ${{ github.ref_name }}