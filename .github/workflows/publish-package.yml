name: Package Publishing

on:
  push:
    branches:
      - 'feature/*'
  workflow_call:
    inputs:
      # The thread title is needed to determine 
      # when to set the .dev postfix in the package version
      branch_name:
        description: "The name of the branch from which the workflow was triggered"
        type: string
        required: true

concurrency:
  group: publishing-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
  
jobs:
  release-build:
    name: Build package
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: '2.4.1'
          virtualenvs-create: true
          virtualenvs-in-project: true
      
      - name: Show environment variable value
        run: |
          echo "startsWith(github.ref_name, 'release/') is ${{ startsWith(github.ref_name, 'release/') }}"
          echo "github.ref_name is ${{ github.ref_name }}"
          echo "env.NEED_DEV_VERSION_POSTFIX is ${{ env.NEED_DEV_VERSION_POSTFIX }}"
      
      - name: Generate and setup version with .dev postfix
        id: compute_dev_version
        if: github.event_name == 'push' || startsWith(inputs.branch_name, 'release/')
        run: |
          SHORT_SHA=$(git rev-parse --short=8 HEAD)
          DEV_NUM=$((16#$SHORT_SHA))
          CURRENT_VERSION=$(poetry version -s)
          VERSION="${CURRENT_VERSION}.dev${DEV_NUM}"
          poetry version "${VERSION}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Show released version of the package
        run: |
          echo "Released version of the package is ${{ steps.compute_dev_version.outputs.VERSION }}"

      - name: Build the Package        
        run: |
          poetry build

      - name: Upload dists
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 1

  pypi-publish:
    name: Publish package
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs:
      - release-build
    permissions:
      id-token: write

    environment:
      name: pypi

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0